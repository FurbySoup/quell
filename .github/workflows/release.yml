name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --release --verbose

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash target/release/quell.exe -Algorithm SHA256).Hash
          "$hash  quell.exe" | Out-File -Encoding ascii -FilePath target/release/quell.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/quell.exe
            target/release/quell.exe.sha256
          generate_release_notes: true
